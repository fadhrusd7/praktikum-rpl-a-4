<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login Admin Lestari">
    <title>Login Admin - Lestari</title>
  <script type="module" crossorigin src="/assets/adminLogin-BOWwKcBc.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/api-C-Q1Bbyj.js">
  <link rel="modulepreload" crossorigin href="/assets/toast-CX2z4NRA.js">
  <link rel="modulepreload" crossorigin href="/assets/ui-ylsgDTig.js">
  <link rel="modulepreload" crossorigin href="/assets/session-BgpOydAk.js">
  <link rel="stylesheet" crossorigin href="/assets/api-HYieJlF2.css">
</head>
<body>
    <div class="auth-page">

        <div class="auth-visual">
            <div class="auth-visual-bg-pattern"></div>
            <div class="auth-visual-icon">
                <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Shield icon untuk admin -->
                    <path d="M80 15 L140 40 L140 85 C140 115 115 140 80 150 C45 140 20 115 20 85 L20 40 Z"
                        fill="white" opacity="0.95"/>
                    <polyline points="58,82 72,96 102,66"
                        stroke="#16a34a" stroke-width="10"
                        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </div>
        </div>

        <div class="auth-content">
            <h1 class="auth-title">Panel Admin</h1>
            <p class="auth-subtitle">Masuk menggunakan akun administrator Anda</p>

            <form id="loginAdminForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="email">Email Admin</label>
                    <div class="input-wrap">
                        <input type="email" id="email" class="form-input"
                            placeholder="admin@monitoring.com"
                            autocomplete="email"/>
                    </div>
                    <span class="form-error"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" class="form-input"
                            placeholder="Password"
                            autocomplete="current-password"/>
                        <button type="button" class="password-toggle" tabindex="-1" aria-label="Tampilkan password">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <span class="form-error"></span>
                </div>

                <button type="submit" class="btn-auth">Masuk sebagai Admin</button>
            </form>

            <div class="auth-switch">
                Bukan admin? <a href="login.html">Login sebagai pengguna</a>
            </div>
        </div>

    </div>

    <div class="toast-container" aria-live="polite"></div>

</body>
</html>
