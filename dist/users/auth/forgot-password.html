<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset password akun Lestari Anda">
    <title>Lupa Password - Lestari</title>
  <script type="module" crossorigin src="/assets/userForgotPass-CQQpIv-o.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/api-C-Q1Bbyj.js">
  <link rel="modulepreload" crossorigin href="/assets/toast-CX2z4NRA.js">
  <link rel="modulepreload" crossorigin href="/assets/ui-ylsgDTig.js">
  <link rel="stylesheet" crossorigin href="/assets/api-HYieJlF2.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-panel">
            <a href="login.html" class="auth-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>
                Kembali ke Login
            </a>
            <a href="../../index.html" class="auth-logo"></a>
            <div class="auth-content">
                <h1 class="auth-title">Lupa Password?</h1>
                <p class="auth-subtitle">Masukkan email anda untuk menerima kode OTP</p>

                <form id="forgotForm" novalidate>
                        <div class="form-group">
                            <label class="form-label" for="email">Email</label>
                            <div class="input-wrap">
                                <input type="email" id="email" class="form-input" placeholder="Email@gmail.com" autocomplete="email"/>
                            </div>
                            <span class="form-error"></span>
                        </div>
                    <button type="submit" class="btn-auth">Kirim Kode OTP</button>
                </form>

                <div class="auth-switch">
                    Ingat password Anda? <a href="login.html">Masuk</a>
                </div>
            </div>
        </div>

        <div class="auth-visual">
            <div class="auth-visual-bg-pattern"></div>
            <div class="auth-visual-icon">
                <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="30" y="70" width="100" height="75" rx="14" fill="white" opacity="0.95"/>
                    <path d="M50 70 V50 A30 30 0 0 1 110 50 V70" stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>
                    <text x="80" y="120" text-anchor="middle" font-family="poppins" font-size="38" font-weight="bold" fill="#16a34a">?</text>
                </svg>
            </div>
        </div>
    </div>

    <div class="toast-container" aria-live="polite"></div>

</body>
</html>
