<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Riwayat laporan – Lestari Admin Panel"/>
  <title>Riwayat – Lestari Admin</title>

  <!-- Google Fonts: Poppins (sesuai profile-admin) -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <!-- App CSS -->
  <link rel="stylesheet" href="../../css/report-admin.css"/>
  <link rel="stylesheet" href="../../css/history-admin.css"/>
  <link rel="stylesheet" href="../../shared/toast.css"/>
</head>
<body>

<div class="app-shell">

  <!-- ═══════════════════════════════════════════════
       SIDEBAR OVERLAY (mobile)
  ═══════════════════════════════════════════════ -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ═══════════════════════════════════════════════
       SIDEBAR
  ═══════════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">

    <!-- Brand -->
    <a href="#" class="sidebar-brand">
       <img src="../../assets/Logo.png" alt="Lestari Logo" class="brand-logo"/>
       <div class="brand-text-wrap">
         <span class="brand-name">Lestari</span>
         <span class="brand-tagline">Lapor Isu Lingkungan</span>
       </div>
    </a>

    <!-- Nav -->
    <nav class="sidebar-nav" aria-label="Menu utama">

      <a href="../dashboard/dashboard-admin.html" class="nav-item" data-page="dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>

      <a href="../laporan/report-admin.html" class="nav-item" data-page="laporan">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
        </svg>
        Laporan
      </a>

      <a href="../peta/peta-admin.html" class="nav-item" data-page="peta">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        Peta
      </a>

      <a href="history-admin.html" class="nav-item active" data-page="riwayat" aria-current="page">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="12 8 12 12 14 14"/>
          <path d="M3.05 11a9 9 0 1 1 .5 4M3 21v-6h6"/>
        </svg>
        Riwayat
      </a>

      <a href="../profil/profile-admin.html" class="nav-item" data-page="profil">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Profil
      </a>

    </nav>

    <!-- User profile -->
    <div class="sidebar-user">
      <div class="user-avatar">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
          stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="user-info">
        <div class="user-name" id="sidebarUserName">Administrator – 1</div>
        <div class="user-email" id="sidebarUserEmail">Lestari Admin Panel</div>
      </div>
    </div>

  </aside><!-- /sidebar -->


  <!-- ═══════════════════════════════════════════════
       MAIN CONTENT
  ═══════════════════════════════════════════════ -->
  <div class="main-content">

    <!-- Page Header -->
    <header class="page-header">
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Buka menu">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
          stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <h1 class="page-title">Riwayat Laporan</h1>
      <div class="header-date" id="header-date"></div>
    </header>

    <!-- Page Body -->
    <div class="page-body">
      <div class="table-card">

        <!-- Toolbar -->
        <div class="table-toolbar">
          <div class="tab-group" id="tab-group">
            <button class="tab active" data-status="semua">Semua</button>
            <button class="tab" data-status="terverifikasi">Terverifikasi</button>
            <button class="tab" data-status="selesai">Selesai</button>
            <button class="tab" data-status="ditolak">Ditolak</button>
          </div>
          <div class="search-wrapper">
            <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="search-input" class="search-input"
              placeholder="Cari Laporan . . ." autocomplete="off"/>
          </div>
        </div>

        <!-- Table -->
        <div class="table-wrapper">
          <table class="report-table">
            <thead>
              <tr>
                <th>Judul Laporan</th>
                <th>Kategori</th>
                <th>Pelapor</th>
                <th>Waktu</th>
                <th>Tindakan</th>
              </tr>
            </thead>
            <tbody id="table-body">
              <tr>
                <td colspan="5">
                  <div class="state-row">
                    <div class="spinner"></div>
                    <span>Memuat riwayat…</span>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
          <div id="pagination" class="pagination"></div>

      </div>
    </div><!-- /page-body -->

  </div><!-- /main-content -->

</div><!-- /app-shell -->

<!-- Badge bulan/tahun: diisi langsung saat parse, tanpa menunggu module (sama seperti profile-admin) -->
<script>
  (function () {
    const el = document.getElementById('header-date');
    if (!el) return;
    const now = new Date();
    el.textContent = now.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
  })();
</script>

<script type="module" src="../../js/admin/history-admin.js"></script>
</body>
</html>
