<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lestari Web</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
    <div class="auth-page">
        <div class="auth-content">
            <h1 class="auth-title">Selamat Datang</h1>
            <p class="auth-subtitle">Masukkan email dan sandi anda untuk masuk ke akun anda</p>

            <form id="loginForm"  novalidate>
                <div class="form-group">
                    <label class="from-label" for="email">Email</label>
                    <div class="input-wrap">
                        <input type="email" id="email" class="form-input" placeholder="Email@gmail.com" autocomplete="email"/>
                    </div>
                    <span class="form-error"></span>
                </div>

                <div class="form-group">
                    <label class="from-label" for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" class="form-input" placeholder="Password" autocomplete="current-password"/>
                        <button type="button" class="password-toggle" tabindex="-1" aria-label="Toggle password">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <span class="form-error"></span>
                    <a href="forgot-password.html" class="forgot-link">Lupa Password?</a>
                </div>

                <button type="submit" class="btn-auth">Masuk</button>
            </form>

            <div class="auth-divider" type="button"><span>atau</span></div>
            <button class="btn-google" type="button">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg> Masuk dengan Google
            </button>

            <div class="auth-swith">
                Belum punya akun? <a href="register.html">Daftar</a>
            </div>
        </div>

        <div class="auth-visual">
        <div class="auth-visual-bg-pattern"></div>
            <div class="auth-visual-icon">
                <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M80 15 L140 40 L140 85 C140 118 112 142 80 150 C48 142 20 118 20 85 L20 40 Z" stroke="white" stroke-width="8" fill="rgba(255,255,255,0.08)" stroke-linejoin="round"/>
                    <polyline points="55,80 72,97 110,62" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </div>
        </div>
    </div>

    <div class="toast-container"></div>
    <script src="js/toast.js"></script>
    <script src="js/ui.js"></script>
    <script type="module" src="js/admin-login.js"></script>
    
</body>
</html>
