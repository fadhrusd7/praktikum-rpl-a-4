<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login Admin Lestari">
    <title>Login Admin - Lestari</title>
    <link rel="stylesheet" href="../../css/global.css?v=3" />
    <link rel="stylesheet" href="../../css/auth.css?v=3" />
    <link rel="stylesheet" href="../../css/responsive.css?v=3" />
</head>
<body>

    <div class="auth-page">

        <!-- ══════════════════════════════════════════
             KOLOM KIRI — FORM LOGIN ADMIN
             (Tanpa: Google, Divider, Lupa Password, Daftar)
        ══════════════════════════════════════════ -->
        <div class="auth-form-col">

            <h1 class="auth-title">Selamat datang kembali</h1>
            <p class="auth-subtitle">Silahkan masukkan detail akun Anda untuk melanjutkan</p>

            <form id="loginAdminForm" novalidate>

                <!-- Email Admin -->
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <div class="input-wrap">
                        <!-- Icon amplop kiri -->
                        <span class="input-icon-left" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                <polyline points="22,6 12,13 2,6"/>
                            </svg>
                        </span>
                        <input
                            type="email"
                            id="email"
                            class="form-input"
                            placeholder="contoh@gmail.com"
                            autocomplete="email"
                            required
                        />
                    </div>
                    <span class="form-error"></span>
                </div>

                <!-- Password Admin -->
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrap">
                        <!-- Icon gembok kiri -->
                        <span class="input-icon-left" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <input
                            type="password"
                            id="password"
                            class="form-input"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            required
                        />
                        <!-- Toggle tampilkan/sembunyikan password — dibaca oleh ui.js -->
                        <button type="button" class="password-toggle" tabindex="-1" aria-label="Tampilkan password">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <span class="form-error"></span>

                    <!-- Row link: Masuk Sebagai User (kiri saja, tanpa Lupa Password) -->
                    <div class="password-row-links">
                        <a href="../../users/auth/login.html" class="link-green">Masuk Sebagai User</a>
                    </div>
                </div>

                <!-- Tombol Masuk (bukan full-width) -->
                <button type="submit" class="btn-auth">Masuk</button>

            </form>

            <!--
                TIDAK ADA:
                - Divider "atau"
                - Tombol Google
                - Link Lupa Kata Sandi
                - Link Daftar / Registrasi
            -->

        </div><!-- /auth-form-col -->


        <!-- ══════════════════════════════════════════
             KOLOM KANAN — VISUAL (GAMBAR ALAM)
             Sama persis dengan login user
        ══════════════════════════════════════════ -->
        <div class="auth-visual-col">

            <!-- Badge Logo Lestari — pojok kanan atas -->
            <div class="auth-badge">
                <img
                    src="../../assets/Logo.png"
                    alt="Lestari Logo"
                    class="auth-badge-logo"
                />
                Lestari
            </div>

            <!-- Kutipan — pojok kanan bawah -->
            <div class="auth-visual-caption">
                <h2>Membangun masa depan yang lebih sehat</h2>
                <p>
                    Satu laporan Anda adalah langkah awal menuju lingkungan yang lebih bersih.
                    Mari pantau, laporkan, dan jaga bumi kita bersama Lestari.
                </p>
            </div>

        </div><!-- /auth-visual-col -->

    </div><!-- /auth-page -->

    <div class="toast-container" aria-live="polite"></div>

    <script type="module" src="../../js/shared/toast.js"></script>
    <script type="module" src="../../js/shared/ui.js"></script>
    <script type="module" src="../../js/admin/login.js"></script>

</body>
</html>
