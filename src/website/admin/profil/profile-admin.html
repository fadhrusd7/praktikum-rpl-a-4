<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Profil admin – Lestari Admin Panel"/>
  <title>Profil & Pengaturan – Lestari Admin</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <!-- App CSS -->
  <link rel="stylesheet" href="../../css/profile-admin.css"/>
  <link rel="stylesheet" href="../../shared/toast.css"/>
</head>
<body>

<div class="app-shell">

  <!-- SIDEBAR OVERLAY (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <!-- Brand -->
    <a href="#" class="sidebar-brand">
      <img src="../../assets/Logo.png" alt="Lestari Logo" class="brand-logo"/>
      <div class="brand-text-wrap">
        <span class="brand-name">Lestari</span>
        <span class="brand-tagline">Lapor Isu Lingkungan</span>
      </div>
    </a>

    <!-- Nav -->
    <nav class="sidebar-nav" aria-label="Menu utama">

      <a href="../dashboard/dashboard-admin.html" class="nav-item" data-page="dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>

      <a href="../laporan/report-admin.html" class="nav-item" data-page="laporan">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
        </svg>
        Laporan
      </a>

      <a href="../peta/peta-admin.html" class="nav-item" data-page="peta">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        Peta
      </a>

      <a href="../riwayat/history-admin.html" class="nav-item" data-page="riwayat">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="12 8 12 12 14 14"/>
          <path d="M3.05 11a9 9 0 1 1 .5 4M3 21v-6h6"/>
        </svg>
        Riwayat
      </a>

      <a href="profile-admin.html" class="nav-item active" data-page="profil" aria-current="page">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Profil
      </a>

    </nav>

    <!-- User profile -->
    <div class="sidebar-user">
      <div class="user-avatar">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
          stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="user-info">
        <div class="user-name" id="sidebar-admin-name">Administrator – 1</div>
        <div class="user-email" id="sidebarUserEmail">Lestari Admin Panel</div>
      </div>
    </div>

  </aside><!-- /sidebar -->


  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- Page Header -->
    <header class="page-header">
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Buka menu">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
          stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <h1 class="page-title">Profil dan Pengaturan</h1>
      <div class="header-date" id="headerDate"></div>
    </header>

    <!-- Page Body -->
    <div class="page-body">

      <!-- Profile Card -->
      <div class="profile-card">

        <!-- Avatar -->
        <div class="profile-avatar-wrap">
          <div class="profile-avatar">
            <svg viewBox="0 0 24 24" width="52" height="52" fill="none"
              stroke="currentColor" stroke-width="1.6">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
        </div>

        <!-- Name -->
        <div class="profile-name" id="admin-display-name">Administrator – 1</div>

        <!-- Divider -->
        <hr class="profile-divider"/>

        <!-- Stats row -->
        <div class="profile-stats">

          <div class="stat-item">
            <div class="stat-label">LAPORAN<br>DIVERIFIKASI</div>
            <div class="stat-value green" id="stat-verified">—</div>
          </div>

          <div class="stat-divider"></div>

          <div class="stat-item">
            <div class="stat-label">STATUS AKUN</div>
            <div class="stat-value">
              <span class="verified-badge" id="statStatus">Verified</span>
            </div>
          </div>

          <div class="stat-divider"></div>

          <div class="stat-item">
            <div class="stat-label">TAHUN AKTIF</div>
            <div class="stat-value" id="stat-active-years">—</div>
          </div>

        </div>

      </div><!-- /profile-card -->

      <!-- Action Buttons Row -->
      <div class="profile-actions">

        <!-- Lihat Feedback button -->
        <a href="../feedback/feedback-admin.html" class="btn-feedback">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
            stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
          Lihat Feedback
        </a>

        <!-- Logout button -->
        <button class="btn-logout" id="btn-logout">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
            stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Keluar Sesi
        </button>

      </div><!-- /profile-actions -->

    </div><!-- /page-body -->

  </div><!-- /main-content -->

</div><!-- /app-shell -->

<script type="module" src="../../js/admin/profile-admin.js"></script>
<script>
  (function () {
    const el = document.getElementById('headerDate');
    if (!el) return;
    const now = new Date();
    el.textContent = now.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
  })();
</script>
</body>
</html>
