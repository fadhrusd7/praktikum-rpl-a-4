<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Peta admin – Lestari Admin Panel"/>
  <title>Peta – Lestari Admin</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- App CSS -->
  <link rel="stylesheet" href="../../css/peta-admin.css"/>
</head>
<body>

<div class="app-shell">

  <!-- SIDEBAR OVERLAY (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <!-- Brand -->
    <!-- Brand -->
    <a href="#" class="sidebar-brand">
       <img src="../../assets/Logo.png" alt="Lestari Logo" class="brand-logo"/>
       <div class="brand-text-wrap">
       <span class="brand-name">Lestari</span>
       <span class="brand-tagline">Lapor Isu Lingkungan</span>
    </div>
    </a>

    <!-- Nav -->
    <nav class="sidebar-nav" aria-label="Menu utama">

      <a href="../dashboard/dashboard-admin.html" class="nav-item" data-page="dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>

      <a href="../laporan/report-admin.html" class="nav-item" data-page="laporan">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
        </svg>
        Laporan
      </a>

      <a href="peta-admin.html" class="nav-item active" data-page="peta" aria-current="page">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        Peta
      </a>

      <a href="../riwayat/history-admin.html" class="nav-item" data-page="riwayat">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="12 8 12 12 14 14"/>
          <path d="M3.05 11a9 9 0 1 1 .5 4M3 21v-6h6"/>
        </svg>
        Riwayat
      </a>

      <a href="../profil/profile-admin.html" class="nav-item" data-page="profil">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Profil
      </a>

    </nav>

    <!-- User profile -->
    <div class="sidebar-user">
      <div class="user-avatar">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
          stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="user-info">
        <div class="user-name" id="sidebarUserName">Administrator – 1</div>
        <div class="user-email" id="sidebarUserEmail">Lestari Admin Panel</div>
      </div>
    </div>

  </aside><!-- /sidebar -->


  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- Page Header -->
    <header class="page-header">
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Buka menu">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
          stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <h1 class="page-title">Peta</h1>

      <!-- Search bar -->
      <div class="map-search-wrapper">
        <svg class="map-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="mapSearchInput" class="map-search-input"
          placeholder="Cari Kota atau jalan . . ." autocomplete="off"/>
      </div>

      <div class="header-date" id="headerDate"></div>
    </header>

    <!-- Map Area -->
    <div class="map-wrapper">

      <!-- Filter Tabs (overlay on map) -->
      <div class="map-filter-bar" id="mapFilterBar">
        <button class="map-tab active" data-filter="semua">Semua</button>
        <button class="map-tab" data-filter="tertunda">
          <span class="dot dot-yellow"></span>Tertunda
        </button>
        <button class="map-tab" data-filter="terverifikasi">
          <span class="dot dot-green"></span>Terverifikasi
        </button>
      </div>

      <!-- Leaflet Map -->
      <div id="map"></div>

      <!-- Legend (bottom-left overlay) -->
      <div class="map-legend" id="mapLegend">
        <div class="legend-title">Status</div>
        <div class="legend-item">
          <span class="legend-dot legend-dot-yellow"></span>
          <span>Tertunda</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot legend-dot-green"></span>
          <span>Terverifikasi</span>
        </div>
      </div>

      <!-- Inspect Card (right overlay) - hidden by default -->
      <div class="inspect-card hidden" id="inspectCard">
        <button class="inspect-close" id="inspectClose" aria-label="Tutup">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>

        <!-- Badge status -->
        <div class="inspect-badge" id="inspectBadge">Tertunda</div>

        <!-- Title & ID -->
        <div class="inspect-title" id="inspectTitle">—</div>
        <div class="inspect-id" id="inspectId">—</div>

        <!-- Location -->
        <div class="inspect-location" id="inspectLocation">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
            <circle cx="12" cy="9" r="2.5"/>
          </svg>
          <span id="inspectLocationText">—</span>
        </div>

        <!-- Category tag -->
        <div class="inspect-category-wrap">
          <span class="inspect-category-tag" id="inspectCategory">—</span>
        </div>

        <!-- Photo -->
        <div class="inspect-photo-wrap">
          <img class="inspect-photo" id="inspectPhoto" src="" alt="Foto laporan"/>
          <div class="inspect-photo-placeholder hidden" id="inspectPhotoPlaceholder">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <span>Tidak ada foto</span>
          </div>
        </div>

        <!-- Reporter info -->
        <div class="inspect-meta">
          <div class="inspect-meta-row">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <div>
              <div class="inspect-meta-label">Pelapor</div>
              <div class="inspect-meta-value" id="inspectReporter">—</div>
            </div>
          </div>
          <div class="inspect-meta-row">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            <div>
              <div class="inspect-meta-label">Dilaporkan pada</div>
              <div class="inspect-meta-value" id="inspectDate">—</div>
            </div>
          </div>
        </div>

        <!-- Detail button -->
        <a class="inspect-detail-btn" id="inspectDetailBtn" href="#">Detail</a>
      </div><!-- /inspect-card -->

    </div><!-- /map-wrapper -->

  </div><!-- /main-content -->

</div><!-- /app-shell -->

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- App JS -->
<script type="module" src="../../js/admin/peta-admin.js"></script>
</body>
</html>
