<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Laporan - Lestari</title>
     <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/map-users.css" />
  <link rel="stylesheet" href="../../css/history-users.css" />
</head>
<body>
    
<aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
        <div class="logo">
            <div class="logo-icon">
                <img src="../../assets/Logo.png" alt="Logo Lestari" class="logo-img">
            </div>
            <div>
                <div class="logo-text">Lestari</div>
                <div class="logo-tagline">Lapor Isu Lingkungan</div>
            </div>
        </div>
        <nav class="nav-menu">
            <ul>
                <li>
                    <a href="../dashboard/map-users.html" class="nav-item" data-page="peta">
                        <span class="nav-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                                <circle cx="12" cy="9" r="2.5"/>
                            </svg>
                        </span>
                        <span class="nav-text">Peta</span>
                    </a>
                </li>
                <li>
                    <a href="../laporan/report-users.html" class="nav-item" data-page="laporan">
                        <span class="nav-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                                <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
                            </svg>
                        </span>
                        <span class="nav-text">Laporan</span>
                    </a>
                </li>
                <li>
                    <a href="../riwayat/history-users.html" class="nav-item active" data-page="riwayat">
                        <span class="nav-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="12 8 12 12 14 14"/>
                                <path d="M3.05 11a9 9 0 1 1 .5 4M3 21v-6h6"/>
                            </svg>
                        </span>
                        <span class="nav-text">Riwayat</span>
                    </a>
                </li>
                <li>
                    <a href="../profil/profile-users.html" class="nav-item" data-page="profil">
                        <span class="nav-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                        <span class="nav-text">Profil</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <div class="sidebar-bottom">
        <div class="sidebar-divider"></div>
        <div class="user-profile">
                <div class="user-avatar">
                    <img 
                        src="https://ui-avatars.com/api/?name=User&background=E0FBD2&color=00AA13" 
                        alt="Foto Profil Sidebar" 
                        id="sidebar-avatar-img" 
                        style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background-color: #E0FBD2;"
                    >
                    <span class="user-status"></span>
                </div>
            <div class="user-info">
                <p class="user-name" id="sidebarUserName">Nama Pengguna</p>
                <p class="user-email" id="sidebarUserEmail">email@gmail.com</p>
            </div>
        </div>
    </div>
</aside>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="main-content">
 
      <!-- Header -->
      <header class="page-header">
        <h1 class="header-title">Riwayat</h1>
        <span class="date-badge" id="dateBadgeEl">Juni 2026</span>
      </header>
 
      <!-- Body -->
      <main class="page-body">
        <div class="table-card">
 
          <!-- Toolbar -->
          <div class="table-toolbar">
            <div class="tabs">
              <button class="tab-btn active" data-tab="semua">Semua</button>
              <button class="tab-btn" data-tab="tertunda">Tertunda</button>
              <button class="tab-btn" data-tab="terverifikasi">Terverifikasi</button>
              <button class="tab-btn" data-tab="selesai">Selesai</button>
              <button class="tab-btn" data-tab="ditolak">Ditolak</button>
            </div>
            <div class="search-wrap">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              <input
                class="search-input"
                id="searchInput"
                type="text"
                placeholder="Cari Laporan . . ."
              />
            </div>
          </div>
 
          <!-- Table -->
          <table class="report-table">
            <thead>
              <tr>
                <th>Judul Laporan</th>
                <th>Kategori</th>
                <th>Waktu</th>
                <th>Tindakan</th>
              </tr>
            </thead>
            <tbody id="reportTableBody">
              <!-- Diisi oleh JS -->
            </tbody>
          </table>
 
        </div>
      </main>
    </div>
  </div>
 
  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>
 
  <script type="module" src="../../js/users/history.js"></script>
</body>
</html>
