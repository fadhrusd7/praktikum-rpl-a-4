<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lestari Web</title>
<link rel="stylesheet" href="../../css/global.css" />
<link rel="stylesheet" href="../../css/auth.css" />
<link rel="stylesheet" href="../../css/responsive.css" />
</head>
<body>
    <div class="auth-page" id="mainPage">
        <div class="auth-panel">
            <a href="verify-otp.html" class="auth-back" id="backLink">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="15,18 9,12 15,6"/>
            </svg>
            Kembali
            </a>

            <a href="../../index.html" class="auth-logo"></a>
            <div class="auth-content" id="newPasswordForm">
                <h1 class="auth-title">Buat Password Baru</h1>
                <p class="auth-subtitle">Masukkan password baru untuk akun anda</p>

                <form id="passwordForm" novalidate>
                        <div class="form-group">
                            <label class="form-label" for="password">Password Baru</label>
                            <div class="input-wrap">
                                <input type="password" id="password" class="form-input" placeholder="Masukkan password baru" autocomplete="new-password"/>
                                <button type="button" class="password-toggle" tabindex="-1">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                            </div>
                            <span class="form-error"></span>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="confirmPassword">Konfirmasi Password</label>
                            <div class="input-wrap">
                                <input type="password" id="confirmPassword" class="form-input" placeholder="Konfirmasi password baru" autocomplete="new-password"/>
                                <button type="button" class="password-toggle" tabindex="-1">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                            </div>
                            <span class="form-error"></span>
                        </div>
                    <button type="submit" class="btn-auth">Simpan Password</button>
                </form>
            </div>

            <div class="auth-content" id="successState">
                <div class="success-icon">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="9,12 11,14 15,10"/>
                    </svg>
                </div>
                <h1 class="auth-title">Password Berhasil<br/>Diubah!</h1>
                <p class="auth-subtitle">Password Anda telah berhasil diperbarui. Silakan login menggunakan password baru Anda.</p>
                <a href="login.html" class="btn-auth" style="display:block;margin-top:32px;text-align:center;text-decoration:none;">
                    Masuk Sekarang
                </a>
            </div>
        </div>

        <div class="auth-visual" id="visualPanel">
            <div class="auth-visual-bg-pattern"></div>
            <div class="auth-visual-icon">
                <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20,45 L20,20 L45,20" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <path d="M115,20 L140,20 L140,45" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <path d="M140,115 L140,140 L115,140" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <path d="M45,140 L20,140 L20,115" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

                    <rect x="55" y="75" width="50" height="42" rx="8" fill="white" opacity="0.95"/>
                    <path d="M67 75 V62 A13 13 0 0 1 93 62 V75" stroke="white" stroke-width="8" stroke-linecap="round" fill="none"/>
                    <circle cx="80" cy="93" r="5" fill="#16a34a"/>
                    <line x1="80" y1="98" x2="80" y2="107" stroke="#16a34a" stroke-width="3.5" stroke-linecap="round"/>
                </svg>
            </div>
        </div>
    </div>

    <div class="toast-container"></div>
    <script type="module" src="../../js/reset-password.js"></script>
</body>
</html>
