<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Memproses login Google">
    <title>Memproses Login - Lestari</title>
    <link rel="stylesheet" href="../../css/global.css" />
    <link rel="stylesheet" href="../../css/auth.css" />
    <link rel="stylesheet" href="../../css/responsive.css" />
    <style>
        .callback-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            text-align: center;
        }
        .spinner-large {
            width: 48px;
            height: 48px;
            animation: spin .8s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="callback-wrap">
        <svg class="spinner-large" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0" opacity="0.2"/>
            <path d="M21 12a9 9 0 00-9-9" stroke="#16a34a"/>
        </svg>
        <p style="color: var(--color-text-secondary, #666); font-size: 15px;">
            Memproses login Google, harap tunggu...
        </p>
    </div>

    <div class="toast-container" aria-live="polite"></div>

    <script type="module" src="../../js/toast.js"></script>
    <script type="module" src="../../js/google-callback.js"></script>
</body>
</html>
