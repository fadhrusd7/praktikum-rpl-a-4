<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset password akun Lestari Anda">
    <title>Lupa Kata Sandi - Lestari</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/auth.css">
    <link rel="stylesheet" href="../../css/responsive.css">
</head>
<body>

<div class="auth-page">

    <!-- LEFT: Visual Column -->
    <aside class="auth-visual">
        <!-- Lestari badge — top-left -->
        <div class="auth-badge">
            <img src="../../assets/Logo.png" alt="Lestari Logo" class="auth-badge-logo">
            <span>Lestari</span>
        </div>

        <!-- Caption overlay -->
        <div class="auth-visual-caption">
            <h2>Membangun masa depan yang lebih sehat</h2>
            <p>Satu laporan Anda adalah langkah awal menuju lingkungan yang lebih bersih. Mari pantau, laporkan, dan jaga bumi kita bersama Lestari.</p>
        </div>
    </aside>

    <!-- RIGHT: Form Column -->
    <main class="auth-panel">
        <div class="auth-content">
            <h1 class="auth-title">Lupa Kata Sandi?</h1>
            <p class="auth-subtitle">Masukkan email Anda untuk menerima kode OTP</p>

            <form id="forgotForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <div class="input-wrap">
                        <!-- Mail icon -->
                        <span class="input-icon-left" aria-hidden="true">
                            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="2"/>
                                <polyline points="2,4 12,13 22,4"/>
                            </svg>
                        </span>
                        <input
                            type="email"
                            id="email"
                            class="form-input no-toggle"
                            placeholder="contoh@gmail.com"
                            autocomplete="email"
                            aria-describedby="emailError"
                            required
                        >
                    </div>
                    <div class="form-error" id="emailError" role="alert"></div>
                </div>

                <button type="submit" class="btn-auth" aria-label="Kirim kode OTP ke email">
                    Kirim kode OTP
                </button>
            </form>

            <p class="auth-footer-text">
                Ingat kata sandi Anda? <a href="login.html">Masuk</a>
            </p>
        </div>
    </main>

</div>

<!-- Loading Overlay -->
<div class="loading-overlay hidden" id="loadingOverlay" role="status" aria-live="polite">
    <div class="spinner">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--green-main, #16a34a)" stroke-width="2.5">
            <path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0" stroke-opacity="0.2"/>
            <path d="M21 12a9 9 0 00-9-9"/>
        </svg>
    </div>
</div>

<div class="toast-container" aria-live="polite" aria-atomic="true"></div>

<script type="module" src="../../js/shared/toast.js"></script>
<script type="module" src="../../js/shared/ui.js"></script>
<script type="module" src="../../js/users/forgot-password.js"></script>
</body>
</html>
