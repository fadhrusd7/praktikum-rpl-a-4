    <link rel="stylesheet" href="../../css/privacy-security.css" />
    <link rel="stylesheet" href="../../css/profile-common.css" />

</head>
<body>

    <!-- ===================== SIDEBAR ===================== -->
 <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
        <div class="logo">
            <div class="logo-icon">
                <img src="../../assets/Logo.png" alt="Logo Lestari" class="logo-img">
            </div>
            <div>
                <div class="logo-text">Lestari</div>
                <div class="logo-tagline">Lapor Isu Lingkungan</div>
            </div>
        </div>
        <nav class="nav-menu">
            <ul>
                <li>
                    <a href="../dashboard/map-users.html" class="nav-item" data-page="peta">
                        <span class="nav-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                                <circle cx="12" cy="9" r="2.5"/>
                            </svg>
                        </span>
                        <span class="nav-text">Peta</span>
                    </a>
                </li>
                <li>
                    <a href="../laporan/report-users.html" class="nav-item" data-page="laporan">
                        <span class="nav-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                                <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
                            </svg>
                        </span>
                        <span class="nav-text">Laporan</span>
                    </a>
                </li>
                <li>
                    <a href="../riwayat/history-users.html" class="nav-item" data-page="riwayat">
                        <span class="nav-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="12 8 12 12 14 14"/>
                                <path d="M3.05 11a9 9 0 1 1 .5 4M3 21v-6h6"/>
                            </svg>
                        </span>
                        <span class="nav-text">Riwayat</span>
                    </a>
                </li>
                <li>
                    <a href="../profil/profile-users.html" class="nav-item active" data-page="profil">
                        <span class="nav-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>

                            </svg>
                        </span>
                        <span class="nav-text">Profil</span>

                </li>
            </ul>
        </nav>
    </div>

    <div class="sidebar-bottom">
        <div class="sidebar-divider"></div>
        <div class="user-profile">
            <div class="user-avatar">
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="20" fill="#E0FBD2"/>
                    <circle cx="20" cy="16" r="7" fill="#00AA13"/>
                    <ellipse cx="20" cy="34" rx="11" ry="8" fill="#00AA13"/>
                </svg>
                <span class="user-status"></span>
            </div>
            <div class="user-info">
                <p class="user-name" id="sidebarUserName">Nama Pengguna</p>
                <p class="user-email" id="sidebarUserEmail">email@gmail.com</p>
            </div>
        </div>
    </div>
</aside>
    <!-- ===================== END SIDEBAR ===================== -->


    <!-- ===================== MAIN CONTENT ===================== -->
    <main class="main-content">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar__left">
                <a href="profile-users.html" class="topbar__back-btn" aria-label="Kembali ke halaman profil">
                    <span class="topbar__back-icon" aria-hidden="true">&lt;</span>
                </a>
                <h1 class="topbar__title">Privasi &amp; Keamanan</h1>
            </div>
            <div class="topbar__right">
                <span class="topbar__date" id="topbar-date">Juni 2026</span>
            </div>
        </header>
        <!-- END TOPBAR -->

        <!-- PAGE BODY -->
        <section class="page-body page-body--privacy-security">

            <div class="privacy-security-layout">

                <!-- LEFT COLUMN: Change Password -->
                <div class="privacy-security-layout__left">

                    <!-- Change Password Card -->
                    <div class="change-password-card card" id="change-password-section">
                        <h2 class="card__title">Ganti Sandi</h2>

                        <form
                            id="change-password-form"
                            class="form"
                            method="POST"
                            novalidate
                        >

                            <div class="form__group" id="group-old-password">
                                <label for="input-old-password" class="form__label">Sandi Lama</label>
                                <div class="form__input-wrapper form__input-wrapper--password">
                                    <input
                                        type="password"
                                        id="input-old-password"
                                        name="old_password"
                                        class="form__input form__input--password"
                                        placeholder=""
                                        autocomplete="current-password"
                                        required
                                    >
                                    <button
                                        type="button"
                                        class="form__password-toggle"
                                        id="toggle-old-password"
                                        aria-label="Tampilkan atau sembunyikan sandi lama"
                                        data-target="input-old-password"
                                    >
                                        <span class="form__password-toggle-icon" aria-hidden="true"></span>
                                    </button>
                                </div>
                                <span class="form__error" id="error-old-password" role="alert" aria-live="polite"></span>
                            </div>

                            <div class="form__group" id="group-new-password">
                                <label for="input-new-password" class="form__label">Sandi Baru</label>
                                <div class="form__input-wrapper form__input-wrapper--password">
                                    <input
                                        type="password"
                                        id="input-new-password"
                                        name="new_password"
                                        class="form__input form__input--password"
                                        placeholder=""
                                        autocomplete="new-password"
                                        required
                                        minlength="8"
                                    >
                                    <button
                                        type="button"
                                        class="form__password-toggle"
                                        id="toggle-new-password"
                                        aria-label="Tampilkan atau sembunyikan sandi baru"
                                        data-target="input-new-password"
                                    >
                                        <span class="form__password-toggle-icon" aria-hidden="true"></span>
                                    </button>
                                </div>
                                <span class="form__error" id="error-new-password" role="alert" aria-live="polite"></span>
                            </div>

                            <div class="form__group" id="group-confirm-password">
                                <label for="input-confirm-password" class="form__label">Konfirmasi Sandi</label>
                                <div class="form__input-wrapper form__input-wrapper--password">
                                    <input
                                        type="password"
                                        id="input-confirm-password"
                                        name="confirm_password"
                                        class="form__input form__input--password"
                                        placeholder=""
                                        autocomplete="new-password"
                                        required
                                        minlength="8"
                                    >
                                    <button
                                        type="button"
                                        class="form__password-toggle"
                                        id="toggle-confirm-password"
                                        aria-label="Tampilkan atau sembunyikan konfirmasi sandi"
                                        data-target="input-confirm-password"
                                    >
                                        <span class="form__password-toggle-icon" aria-hidden="true"></span>
                                    </button>
                                </div>
                                <span class="form__error" id="error-confirm-password" role="alert" aria-live="polite"></span>
                            </div>

                            <div class="form__actions">
                                <button
                                    type="submit"
                                    class="btn btn--primary"
                                    id="btn-change-password"
                                >
                                    Simpan
                                </button>
                            </div>

                        </form>
                    </div>
                    <!-- END Change Password Card -->

                </div>
                <!-- END LEFT COLUMN -->


                <!-- RIGHT COLUMN: Privacy Preferences + Delete Account -->
                <div class="privacy-security-layout__right">

                    <!-- Privacy Preferences Card -->
                    <div class="privacy-preferences-card card" id="privacy-preferences-section">
                        <h2 class="card__title">Preferensi Privasi</h2>

                        <div class="toggle-list">

                            <div class="toggle-item" id="toggle-item-show-name">
                                <label class="toggle-item__label" for="toggle-show-name">
                                    <span class="toggle-item__text">Tampilkan nama di laporan publik</span>
                                    <div class="toggle-item__control">
                                        <input
                                            type="checkbox"
                                            id="toggle-show-name"
                                            name="show_name_public"
                                            class="toggle-item__input visually-hidden"
                                            role="switch"
                                            aria-checked="true"
                                            checked
                                        >
                                        <span class="toggle-item__track" aria-hidden="true">
                                            <span class="toggle-item__thumb"></span>
                                        </span>
                                    </div>
                                </label>
                            </div>

                            <div class="toggle-item" id="toggle-item-share-location">
                                <label class="toggle-item__label" for="toggle-share-location">
                                    <span class="toggle-item__text">Bagikan lokasi saat laporan</span>
                                    <div class="toggle-item__control">
                                        <input
                                            type="checkbox"
                                            id="toggle-share-location"
                                            name="share_location"
                                            class="toggle-item__input visually-hidden"
                                            role="switch"
                                            aria-checked="true"
                                            checked
                                        >
                                        <span class="toggle-item__track" aria-hidden="true">
                                            <span class="toggle-item__thumb"></span>
                                        </span>
                                    </div>
                                </label>
                            </div>

                        </div>
                    </div>
                    <!-- END Privacy Preferences Card -->


                    <!-- Delete Account Section -->
                    <div class="delete-account-section" id="delete-account-section">
                        <button
                            type="button"
                            class="btn btn--danger-outline"
                            id="btn-delete-account"
                            aria-label="Hapus akun secara permanen"
                        >
                            Hapus Akun
                        </button>
                    </div>
                    <!-- END Delete Account Section -->

                </div>
                <!-- END RIGHT COLUMN -->

            </div>

        </section>
        <!-- END PAGE BODY -->

    </main>
    <!-- ===================== END MAIN CONTENT ===================== -->

    <!-- Delete Account Confirmation Modal -->
    <div
        class="modal modal--danger"
        id="modal-delete-account"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-delete-title"
        aria-describedby="modal-delete-desc"
        hidden
    >
        <div class="modal__overlay" id="modal-delete-overlay"></div>
        <div class="modal__dialog">
            <div class="modal__header">
                <h2 class="modal__title" id="modal-delete-title">Hapus Akun</h2>
            </div>
            <div class="modal__body">
                <p class="modal__description" id="modal-delete-desc">
                    Tindakan ini tidak dapat dibatalkan. Seluruh data Anda akan dihapus secara permanen.
                </p>
            </div>
            <div class="modal__footer">
                <button type="button" class="btn btn--ghost" id="btn-cancel-delete">Batal</button>
                <button type="button" class="btn btn--danger" id="btn-confirm-delete">Hapus Akun</button>
            </div>
        </div>
    </div>
    <!-- END Delete Account Modal -->

    <script type="module" src="../../js/users/privacy-security.js"></script>
</body>
</html>
