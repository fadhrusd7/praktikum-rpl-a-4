<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privasi &amp; Keamanan - Lestari</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="stylesheet" href="../../css/privacy-security.css" />
    <link rel="stylesheet" href="../../css/profile-common.css" />

</head>
<body>

 <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
        <div class="logo">
            <div class="logo-icon">
                <img src="../../assets/Logo.png" alt="Logo Lestari" class="logo-img">
            </div>
            <div>
                <div class="logo-text">Lestari</div>
                <div class="logo-tagline">Lapor Isu Lingkungan</div>
            </div>
        </div>
        <nav class="nav-menu">
            <ul>
                <li>
                    <a href="../dashboard/map-users.html" class="nav-item" data-page="peta">
                        <span class="nav-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                                <circle cx="12" cy="9" r="2.5"/>
                            </svg>
                        </span>
                        <span class="nav-text">Peta</span>
                    </a>
                </li>
                <li>
                    <a href="../laporan/report-users.html" class="nav-item" data-page="laporan">
                        <span class="nav-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                                <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
                            </svg>
                        </span>
                        <span class="nav-text">Laporan</span>
                    </a>
                </li>
                <li>
                    <a href="../riwayat/history-users.html" class="nav-item" data-page="riwayat">
                        <span class="nav-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="12 8 12 12 14 14"/>
                                <path d="M3.05 11a9 9 0 1 1 .5 4M3 21v-6h6"/>
                            </svg>
                        </span>
                        <span class="nav-text">Riwayat</span>
                    </a>
                </li>
                <li>
                    <a href="../profil/profile-users.html" class="nav-item active" data-page="profil">
                        <span class="nav-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                        <span class="nav-text">Profil</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <div class="sidebar-bottom">
        <div class="sidebar-divider"></div>
        <div class="user-profile">
                <div class="user-avatar">
                    <img 
                        src="https://ui-avatars.com/api/?name=User&background=E0FBD2&color=00AA13" 
                        alt="Foto Profil Sidebar" 
                        id="sidebar-avatar-img" 
                        style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background-color: #E0FBD2;"
                    >
                    <span class="user-status"></span>
                </div>
            <div class="user-info">
                <p class="user-name" id="sidebarUserName">Nama Pengguna</p>
                <p class="user-email" id="sidebarUserEmail">email@gmail.com</p>
            </div>
        </div>
    </div>
</aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar__left">
                <a href="profile-users.html" class="topbar__back-btn" aria-label="Kembali ke halaman profil">
                    <span class="topbar__back-icon" aria-hidden="true">&lt;</span>
                </a>
                <h1 class="topbar__title">Privasi & Keamanan</h1>
            </div>
            <div class="topbar__right">
                <span class="topbar__date" id="topbar-date">Juni 2026</span>
            </div>
        </header>

        <section class="page-body page-body--privacy-security">
            <div class="privacy-security-layout">
                
                <div class="privacy-security-layout__left">
                    <div class="change-password-card card">
                        <h2 class="card__title">Ganti Sandi</h2>
                        
                        <form id="form-change-password" class="form">
                            <div class="form__group">
                                <label class="form__label">Sandi Lama</label>
                                <div class="form__input-wrapper form__input-wrapper--password">
                                    <input type="password" id="old-password" class="form__input form__input--password">
                                    <button type="button" class="form__password-toggle">
                                        <span class="form__password-toggle-icon"></span>
                                    </button>
                                </div>
                            </div>

                            <div class="form__group">
                                <label class="form__label">Sandi Baru</label>
                                <div class="form__input-wrapper form__input-wrapper--password">
                                    <input type="password" id="new-password" class="form__input form__input--password">
                                    <button type="button" class="form__password-toggle">
                                        <span class="form__password-toggle-icon"></span>
                                    </button>
                                </div>
                            </div>

                            <div class="form__group">
                                <label class="form__label">Konfirmasi Sandi</label>
                                <div class="form__input-wrapper form__input-wrapper--password">
                                    <input type="password" id="confirm-password" class="form__input form__input--password">
                                    <button type="button" class="form__password-toggle">
                                        <span class="form__password-toggle-icon"></span>
                                    </button>
                                </div>
                            </div>

                            <button type="submit" class="btn btn--primary">Simpan</button>
                        </form>
                    </div>
                </div>

                <div class="privacy-security-layout__right">
                    
                    <div class="privacy-preferences-card card">
                        <h2 class="card__title">Preferensi Privasi</h2>
                        <div class="toggle-list">
                            
                            <div class="toggle-item">
                                <label class="toggle-item__label" for="toggle-public-name">
                                    <span class="toggle-item__text">Tampilkan nama di laporan publik</span>
                                    <div class="toggle-item__control">
                                        <input type="checkbox" id="toggle-public-name" class="toggle-item__input" checked>
                                        <span class="toggle-item__track">
                                            <span class="toggle-item__thumb"></span>
                                        </span>
                                    </div>
                                </label>
                            </div>

                            <div class="toggle-item">
                                <label class="toggle-item__label" for="toggle-share-location">
                                    <span class="toggle-item__text">Bagikan lokasi saat laporan</span>
                                    <div class="toggle-item__control">
                                        <input type="checkbox" id="toggle-share-location" class="toggle-item__input" checked>
                                        <span class="toggle-item__track">
                                            <span class="toggle-item__thumb"></span>
                                        </span>
                                    </div>
                                </label>
                            </div>

                        </div>
                    </div>

                    <div class="delete-account-section">
                        <button type="button" id="btn-delete-account" class="btn btn--danger-outline">
                            Hapus Akun
                        </button>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <!-- Delete Account Confirmation Modal -->
    <div
        class="modal modal--danger"
        id="modal-delete-account"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-delete-title"
        aria-describedby="modal-delete-desc"
        hidden
    >
        <div class="modal__overlay" id="modal-delete-overlay"></div>
        <div class="modal__dialog">
            <div class="modal__header">
                <h2 class="modal__title" id="modal-delete-title">Hapus Akun</h2>
            </div>
            <div class="modal__body">
                <p class="modal__description" id="modal-delete-desc">
                    Tindakan ini tidak dapat dibatalkan. Seluruh data Anda akan dihapus secara permanen.
                </p>
            </div>
            <div class="modal__footer">
                <button type="button" class="btn btn--ghost" id="btn-cancel-delete">Batal</button>
                <button type="button" class="btn btn--danger" id="btn-confirm-delete">Hapus Akun</button>
            </div>
        </div>
    </div>
    <!-- END Delete Account Modal -->

    <script type="module" src="../../js/users/privacy-security.js"></script>
</body>
</html>
